name: "Project setup"
description: "This actions will setup Python, the cache and install the dependencies"
author: "Mathieu Tarral"
inputs:
  python_version:
    description: "Python version to setup"
    required: true
    default: "3.13"
runs:
  using: "composite"
  steps:
  - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

  - name: Set up Python 🐍
    id: setup-python
    uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
    with:
      python-version: ${{ inputs.python_version }}
      pip-install: poetry
      cache: 'pip'

  - name: Setup a local virtual environment (if no poetry.toml file)
    run: |
      poetry config virtualenvs.create true --local
      poetry config virtualenvs.in-project true --local
    shell: bash

  - name: Default shell
    run: |
      if [ "$RUNNER_OS" == "Linux" ]; then
            echo shellos=bash >> $GITHUB_ENV
      elif [ "$RUNNER_OS" == "Windows" ]; then
            echo shellos=powershell >> $GITHUB_ENV
      else
            echo "$RUNNER_OS not supported"
            exit 1
      fi
    shell: bash

  - uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
    name: Cache definition for Poetry (Python ${{ inputs.python_version }}, ${{ env.shellos }})
    with:
      path: ./.venv
      key: venv-${{ hashFiles('poetry.lock') }}-py${{ inputs.python_version }}-${{ env.shellos }}

  - name: Install project
    run: poetry install --no-interaction
    shell: ${{ env.shellos }}
